name: Gerar Resultados Live

on:
  repository_dispatch:
    types:
      - cartola_live_publish
  workflow_dispatch:
    inputs:
      payload_json:
        description: "Payload JSON manual para teste. Em uso real, vem do GS Cartola Live Publisher via repository_dispatch."
        required: false
        default: ""

permissions:
  contents: write
  actions: read

concurrency:
  group: gerar-resultados-live-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gerar-resultados-live:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Mostrar origem do disparo
        shell: bash
        run: |
          echo "===== ORIGEM DO DISPARO ====="
          echo "github.event_name=${{ github.event_name }}"
          echo "github.event.action=${{ github.event.action }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"

      - name: Instalar dependências
        shell: bash
        run: |
          set -e

          python -m pip install --upgrade pip setuptools wheel

          if [ -f requirements.txt ]; then
            pip install --upgrade -r requirements.txt
          else
            echo "AVISO: requirements.txt não encontrado."
          fi

      - name: Garantir pastas padrão
        shell: bash
        run: |
          set -e

          mkdir -p data
          mkdir -p output

      - name: Salvar payload em arquivo auxiliar
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          MANUAL_PAYLOAD: ${{ github.event.inputs.payload_json }}
        run: |
          set -e

          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            echo "$DISPATCH_PAYLOAD" > data/payload_dispatch.json
            echo "Payload recebido via repository_dispatch salvo em data/payload_dispatch.json"
          else
            if [ -z "$MANUAL_PAYLOAD" ]; then
              echo "ERRO: execução manual sem payload."
              echo "Este workflow é do Live Publisher e, em produção, deve ser disparado pelo Apps Script via cartola_live_publish."
              echo "Para teste manual, use o campo payload_json no botão Run workflow."
              exit 1
            fi

            echo "$MANUAL_PAYLOAD" > data/payload_dispatch.json
            echo "Payload manual salvo em data/payload_dispatch.json"
          fi

          echo "===== CONTEÚDO DO PAYLOAD SALVO ====="
          cat data/payload_dispatch.json || true

      - name: Validar payload do Live Publisher
        shell: bash
        run: |
          set -e

          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/payload_dispatch.json")

          if not path.exists():
              raise SystemExit("ERRO: data/payload_dispatch.json não encontrado.")

          texto = path.read_text(encoding="utf-8").strip()

          if not texto:
              raise SystemExit("ERRO: payload vazio.")

          try:
              payload = json.loads(texto)
          except Exception as exc:
              raise SystemExit(f"ERRO: payload JSON inválido: {exc}")

          if payload is None:
              raise SystemExit(
                  "ERRO: payload veio como null. "
                  "Isso acontece quando o workflow é executado manualmente sem payload_json. "
                  "Use o Apps Script/Live Publisher ou informe um payload_json manual."
              )

          if not isinstance(payload, dict):
              raise SystemExit(f"ERRO: payload precisa ser objeto JSON. Tipo recebido: {type(payload).__name__}")

          evento = str(payload.get("evento_github", "") or "").strip()
          origem = str(payload.get("origem", "") or "").strip()
          workflow_destino = str(payload.get("workflow_destino", "") or "").strip()
          tipo_publicacao = str(payload.get("tipo_publicacao", "") or "").strip()
          contexto = str(payload.get("contexto", "") or "").strip()
          rodada = payload.get("rodada", "")
          status_mercado = payload.get("status_mercado", "")

          print("Payload Live identificado:")
          print("origem:", origem)
          print("evento_github:", evento)
          print("workflow_destino:", workflow_destino)
          print("tipo_publicacao:", tipo_publicacao)
          print("contexto:", contexto)
          print("rodada:", rodada)
          print("status_mercado:", status_mercado)

          if evento and evento != "cartola_live_publish":
              raise SystemExit(f"ERRO: evento_github incorreto para o Live Publisher: {evento}")

          if workflow_destino and workflow_destino != "gerar.resultados.yml":
              raise SystemExit(f"ERRO: workflow_destino incorreto para o Live Publisher: {workflow_destino}")

          if origem and "live" not in origem.lower():
              raise SystemExit(
                  "ERRO: origem incorreta para este workflow. "
                  f"Recebido origem='{origem}'. "
                  "O gerar.resultados.yml deve receber somente payload do Cartola Live Publisher."
              )

          if not origem:
              raise SystemExit(
                  "ERRO: payload sem campo origem. "
                  "O Apps Script do Live Publisher deve enviar origem='cartola_live_publisher'."
              )

          print("Validação do payload do Live Publisher concluída.")
          PY

      - name: Executar gerador de resultados e resumos
        shell: bash
        env:
          PAYLOAD_FILE: data/payload_dispatch.json
          TZ: America/Sao_Paulo
        run: |
          set -e

          echo "===== EXECUTANDO GERADOR LIVE ====="
          echo "PAYLOAD_FILE=$PAYLOAD_FILE"
          echo "TZ=$TZ"

          export PAYLOAD_JSON="$(cat data/payload_dispatch.json)"

          if [ ! -f "app/gerar_resultados_telegram.py" ]; then
            echo "ERRO: arquivo app/gerar_resultados_telegram.py não encontrado."
            echo "Arquivos disponíveis em app/:"
            ls -la app || true
            exit 1
          fi

          python app/gerar_resultados_telegram.py

      - name: Listar arquivos gerados
        if: always()
        shell: bash
        run: |
          echo "===== DATA ====="
          ls -la data || true

          echo "===== OUTPUT ====="
          ls -la output || true

      - name: Publicar arquivos gerados no repositório
        if: success()
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ output/ || true

          if git diff --cached --quiet; then
            echo "Sem alterações para commit."
            exit 0
          fi

          git commit -m "Live Publisher: geração de resultados e resumos"

          git pull --rebase origin main || true
          git push origin HEAD:main

name: Gerar Resultados Live

on:
  repository_dispatch:
    types:
      - cartola_live_publish
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: gerar-resultados-live-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gerar-resultados-live:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Mostrar payload recebido
        shell: bash
        run: |
          echo "===== EVENTO ====="
          echo "${{ github.event.action }}"
          echo "===== PAYLOAD RECEBIDO ====="
          echo '${{ toJson(github.event.client_payload) }}'

      - name: Instalar dependências
        shell: bash
        run: |
          set -e

          python -m pip install --upgrade pip setuptools wheel

          if [ -f requirements.txt ]; then
            pip install --upgrade -r requirements.txt
          else
            echo "AVISO: requirements.txt não encontrado."
          fi

      - name: Garantir pastas padrão
        shell: bash
        run: |
          set -e

          mkdir -p data
          mkdir -p output

      - name: Salvar payload em arquivo auxiliar
        shell: bash
        run: |
          set -e

          cat > data/payload_dispatch.json <<'EOF'
          ${{ toJson(github.event.client_payload) }}
          EOF

          echo "Payload salvo em data/payload_dispatch.json"
          echo "===== CONTEÚDO DO PAYLOAD SALVO ====="
          cat data/payload_dispatch.json || true

      - name: Executar gerador de resultados e resumos
        shell: bash
        env:
          PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
          PAYLOAD_FILE: data/payload_dispatch.json
          TZ: America/Sao_Paulo
        run: |
          set -e

          echo "===== EXECUTANDO GERADOR LIVE ====="
          echo "PAYLOAD_FILE=$PAYLOAD_FILE"
          echo "TZ=$TZ"

          if [ ! -f "app/gerar_resultados_telegram.py" ]; then
            echo "ERRO: arquivo app/gerar_resultados_telegram.py não encontrado."
            echo "Arquivos disponíveis em app/:"
            ls -la app || true
            exit 1
          fi

          python app/gerar_resultados_telegram.py

      - name: Listar arquivos gerados
        if: always()
        shell: bash
        run: |
          echo "===== DATA ====="
          ls -la data || true

          echo "===== OUTPUT ====="
          ls -la output || true

      - name: Publicar arquivos gerados no repositório
        if: success()
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ output/ || true

          if git diff --cached --quiet; then
            echo "Sem alterações para commit."
            exit 0
          fi

          git commit -m "Live Publisher: geração de resultados e resumos"

          git pull --rebase origin main || true
          git push origin HEAD:main

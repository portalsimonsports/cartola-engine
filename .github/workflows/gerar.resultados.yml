name: Gerar Resultados Teste

on:
  repository_dispatch:
    types:
      - cartola_publish_test

permissions:
  contents: write

jobs:
  gerar-resultados-teste:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Mostrar payload recebido
        run: |
          echo "===== PAYLOAD RECEBIDO ====="
          echo '${{ toJson(github.event.client_payload) }}'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requisitos.txt ]; then pip install -r requisitos.txt; fi

      - name: Garantir pastas padrão
        run: |
          mkdir -p dados
          mkdir -p saida

      - name: Salvar payload em arquivo auxiliar
        run: |
          cat > dados/payload_dispatch.json <<'EOF'
          ${{ toJson(github.event.client_payload) }}
          EOF

      - name: Executar gerador de resultados
        env:
          PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
        run: |
          python aplicativo/gerar_resultados_telegram.py

      - name: Publicar arte gerada no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dados/ saida/ || true

          if git diff --cached --quiet; then
            echo "Sem alterações para commit."
          else
            git commit -m "Teste automático: geração de resultados"
            git push
          fi

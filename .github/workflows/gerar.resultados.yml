name: Gerar Resultados Teste

on:
  repository_dispatch:
    types:
      - cartola_publish_test

permissions:
  contents: write

jobs:
  gerar-resultados-teste:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Mostrar payload recebido
        run: |
          echo "===== PAYLOAD RECEBIDO ====="
          echo '${{ toJson(github.event.client_payload) }}'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Garantir pastas padrão
        run: |
          mkdir -p data
          mkdir -p output

      - name: Salvar payload em arquivo auxiliar
        run: |
          cat > data/payload_dispatch.json <<'EOF'
          ${{ toJson(github.event.client_payload) }}
          EOF

      - name: Salvar credencial Google em arquivo
        env:
          GOOGLE_SERVICE_JSON: ${{ secrets.GOOGLE_SERVICE_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICE_JSON" ]; then
            echo "ERRO: GOOGLE_SERVICE_JSON não definido."
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICE_JSON" > service_account.json

      - name: Validar credencial Google
        run: |
          python - <<'PY'
import json
with open("service_account.json", "r", encoding="utf-8") as f:
    json.load(f)
print("Credencial Google válida.")
PY

      - name: Executar gerador de resultados
        env:
          PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
          GOOGLE_APPLICATION_CREDENTIALS: service_account.json
          PLANILHA_ID: 1-A7w4kkE28iHRd61yiSoNOvSekrmmADzHxGCRDVrICI
        run: |
          python app/gerar_resultados_telegram.py

      - name: Publicar arte gerada no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ output/ || true

          if git diff --cached --quiet; then
            echo "Sem alterações para commit."
            exit 0
          fi

          git commit -m "Teste automático: geração de resultados" || echo "Nada para commit"

          git pull --rebase origin main || true
          git push origin HEAD:main || true
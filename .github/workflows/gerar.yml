name: Gerar Imagens Cartola

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar script
        run: |
          python app/gerar_imagens.py

      - name: Commit imagens
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add output/
          git commit -m "Atualização automática imagens" || echo "Nada para commit"
          git push

      - name: 🚀 Enviar Imagens para o Telegram
        env:
          WEBHOOK_URL: "https://script.google.com/macros/s/AKfycby0DYNOArrcP626LVcoFTvZHWJ-FvABqwG4a_A_pkNwP70ll_PsgqzV5NkMOypc09qs/exec"
          BASE_URL: "https://raw.githubusercontent.com/portalsimonsports/cartola-engine/main/output"
        run: |
          # 1. Envia o Top 5
          curl -X POST $WEBHOOK_URL \
          -H "Content-Type: application/json" \
          -d "{\"imagem_url\": \"$BASE_URL/top5.png\", \"tipo\": \"Top 5\"}"
          
          sleep 2
          
          # 2. Envia o Time Pontuação
          curl -X POST $WEBHOOK_URL \
          -H "Content-Type: application/json" \
          -d "{\"imagem_url\": \"$BASE_URL/times_atual_pontuacao.png\", \"tipo\": \"Time Pontuação\"}"
          
          sleep 2
          
          # 3. Envia o Time Intermediário
          curl -X POST $WEBHOOK_URL \
          -H "Content-Type: application/json" \
          -d "{\"imagem_url\": \"$BASE_URL/times_atual_intermediario.png\", \"tipo\": \"Time Intermediário\"}"
          
          sleep 2
          
          # 4. Envia o Time Econômico
          curl -X POST $WEBHOOK_URL \
          -H "Content-Type: application/json" \
          -d "{\"imagem_url\": \"$BASE_URL/times_atual_economico.png\", \"tipo\": \"Time Econômico\"}"

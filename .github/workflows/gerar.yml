name: Gerar Imagens Cartola

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar script
        run: |
          python app/gerar_imagens.py

      - name: Commit imagens
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add output/
          git commit -m "Atualização automática imagens" || echo "Nada para commit"
          git push

      - name: 🚀 Enviar Imagem para o Telegram
        env:
          WEBHOOK_URL: "https://script.google.com/macros/s/AKfycby0DYNOArrcP626LVcoFTvZHWJ-FvABqwG4a_A_pkNwP70ll_PsgqzV5NkMOypc09qs/exec"
          IMAGE_URL: "https://raw.githubusercontent.com/portalsimonsports/cartola-engine/main/output/NOME_DA_SUA_IMAGEM_AQUI.png"
        run: |
          curl -X POST $WEBHOOK_URL \
          -H "Content-Type: application/json" \
          -d "{\"imagem_url\": \"$IMAGE_URL\", \"tipo\": \"Rodada Atual\"}"

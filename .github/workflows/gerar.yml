name: Gerar Imagens Cartola

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  gerar:
    if: "!contains(github.event.head_commit.message, 'Atualização automática imagens')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar script
        run: python app/gerar_imagens.py

      - name: Commit imagens
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git pull origin main --rebase
          git add output/
          git diff --cached --quiet || git commit -m "Atualização automática imagens"
          git push